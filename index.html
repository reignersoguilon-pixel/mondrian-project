<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    /* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!
    */
    .container{
      width: 748px;
      height: 748px;
      display: grid;
      grid-template-columns: 320px 198px 153px 50px;
      grid-template-rows: 414px 140px 155px 22px;
      gap: 9px;
      padding: 0; 
      background-color: #000000;
    }

    .red{
      background-color: #E72F24;
      height: 414px;
      width: 320px;
    }
    .white1{
      background-color: #F0F1EC;
      height: 414px;
      width: 419px;
    }
    .white2{
      background-color: #F0F1EC;
      grid-area: 2/1/3/2;
      width: 320px;
      height: 304px;
    }
    .white3{
      background-color: #F0F1EC;
      grid-area: 2/2/3/3;
      width: 360px;
      height: 295px;
    }
    .blue{
      background-color: #004592;
      grid-area: 2/4/3/5;
      height: 130px;
      width: 50px;
      border-bottom: 10px solid #000;
    }
    .white4{
      background-color: #F0F1EC;
      grid-area: 4/1/4/2;
      height: 12px;
    }
    .yellow{
      background-color: #F9D01E;
      grid-area: 4/2/4/2;
      height: 12px;
      width: 198px;
    }
    .black{
      background-color: #232629;
      grid-area: 4/3/4/4;
      height: 12px;
      width: 153px;
    }
    .white5{
      background-color: #F0F1EC;
      grid-area: 3/4/4/4;
      height: 176px;
    }
    .main-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 0;
    }
  </style>
</head>

<body>
  <!-- Write your HTML here -->
  <div class="main-container">
    <div class="container">
      <div class="red"></div>
      <div class="white1"></div>
      <div class="white2"></div>
      <div class="white3"></div>
      <div class="blue"></div>
      <div class="white4"></div>
      <div class="yellow"></div>
      <div class="black"></div>
      <div class="white5"></div>
    </div>
    
  </div>
    
    
</body>

</html>
